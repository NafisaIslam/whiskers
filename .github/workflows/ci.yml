name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: whiskers_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d whiskers_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/whiskers_test
      DJANGO_SECRET_KEY: ci-insecure-secret
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "*"
      JWT_SIGNING_KEY: ci-jwt-signing-key

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Run migrations
        run: uv run python manage.py migrate --no-input

      - name: Run tests
        run: uv run pytest -v
